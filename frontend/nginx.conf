# allows {rate} requests per second across all ips combined before limiting kicks in
limit_req_zone $server_name zone=global_limit:1m rate=100r/s;
# allows {rate} requests per second per ip before limiting kicks in
limit_req_zone $binary_remote_addr zone=api_limit:1m rate=10r/s;
# tracks simultaneous connections per ip; limit is enforced inside location /api/
limit_conn_zone $binary_remote_addr zone=ip_conn_limit_zone_name:1m;

server {
    listen 80;

    location /api/ {
        # global rate limit caps total throughput regardless of how many ips are hitting
        limit_req zone=global_limit burst=50 nodelay;
        # connection limit per ip for flask only
        limit_conn ip_conn_limit_zone_name 20;
        # rate limit of {burst} queued requests before rejecting
        # from which {delay} requests are answered immediately and rest is put to wait
        limit_req zone=api_limit burst=20 delay=10;
        limit_req_status 429;
        # docker compose service name
        proxy_pass http://flask-backend:5000;
    }

    location / {
        # sets variable root, never serves anything by itself
        root /usr/share/nginx/html;
        # $uri: try to serve exact file from root (/assets/main.js serves root/assets/main.js)
        # /index.html: fallback that resolves to root/index.html, vue boots and renders the correct page
        try_files $uri /index.html;
    }

    # 429 comes from limit_req; limit_req_status set explicitly
    # 503 comes from limit_conn; default, no limit_conn_status set

    # error_page: nginx directive to map a status code to a named location
    # the @ prefix marks a named internal location, not accessible from the outside
    error_page 429 @rate_limited;
    error_page 503 @server_full;

    location @rate_limited {
        default_type application/json;
        return 429 '{"error": "too many requests"}';
    }

    location @server_full {
        default_type application/json;
        return 503 '{"error": "server is busy"}';
    }
}
